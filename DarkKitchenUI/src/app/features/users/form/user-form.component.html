<div class="form-container">
  <div class="form-card">
    <button type="button" class="back-link" (click)="cancel()">← Back to users</button>

    <h2>{{ isEdit ? 'Edit user' : 'New user' }}</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="row two-cols">
        <div class="field">
          <label for="name">Name *</label>
          <input id="name" type="text" formControlName="name" />
        </div>
        <div class="field">
          <label for="surname">Surname *</label>
          <input id="surname" type="text" formControlName="surname" />
        </div>
      </div>

      <div class="field">
        <label for="email">Email *</label>
        <input id="email" type="email" formControlName="email" />
        @if (isEdit) {
          <span class="hint">Email cannot be changed.</span>
        }
      </div>

      <div class="field">
        <label for="phone">Phone *</label>
        <div class="phone-wrapper">
          <span class="phone-prefix">+598</span>
          <input id="phone" type="tel" formControlName="phone" placeholder="099 123 456" (input)="onPhoneInput($event)" />
        </div>
      </div>

      <div class="field">
        <label for="password">{{ isEdit ? 'New password (leave blank to keep)' : 'Password *' }}</label>
        <div class="input-wrapper">
          <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password" />
          <button type="button" class="toggle-password" (click)="togglePassword()">
            @if (showPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
        <span class="hint">15–25 chars, with upper, lower, special and a digit (no two consecutive digits).</span>
      </div>

      <div class="field">
        <label for="role">Role *</label>
        <select id="role" formControlName="role">
          @for (r of roles; track r) {
            <option [value]="r">{{ r }}</option>
          }
        </select>
        @if (isEdit) {
          <span class="hint">Role cannot be changed after creation.</span>
        }
      </div>

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }

      <div class="actions">
        <button type="button" class="ghost-btn" (click)="cancel()">Cancel</button>
        <button type="submit" class="primary-btn" [disabled]="isSubmitting">
          {{ isEdit ? 'Save changes' : 'Create user' }}
        </button>
      </div>
    </form>
  </div>
</div>
