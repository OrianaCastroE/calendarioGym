<div class="form-container">
  <div class="form-card wide">
    <button type="button" class="back-link" (click)="cancel()">← Back to promotions</button>

    <h2>{{ promotion ? 'Products — ' + promotion.name : 'Manage products' }}</h2>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }

    @if (isLoading) {
      <p class="loading">Loading products...</p>
    } @else if (products.length === 0) {
      <p class="empty">No products available.</p>
    } @else {
      <div class="products-list">
        @for (p of products; track trackById($index, p)) {
          <label class="product-row" [class.selected]="isSelected(p.id)">
            <input type="checkbox" [checked]="isSelected(p.id)" (change)="toggle(p.id)" />
            <span class="product-info">
              <span class="product-name">{{ p.name }}</span>
              <span class="product-meta">#{{ p.code }}@if (p.productLine) { · {{ p.productLine }} }</span>
            </span>
            <span class="product-price">${{ p.price.toFixed(2) }}</span>
          </label>
        }
      </div>

      <div class="actions">
        <button type="button" class="ghost-btn" (click)="cancel()">Cancel</button>
        <button type="button" class="primary-btn" [disabled]="isSubmitting" (click)="save()">
          Save
        </button>
      </div>
    }
  </div>
</div>
