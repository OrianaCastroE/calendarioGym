<div class="form-container">
  <div class="form-card">
    <button type="button" class="back-link" (click)="cancel()">← Back to products</button>

    <h2>{{ isEdit ? 'Edit product' : 'New product' }}</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="row two-cols">
        <div class="field">
          <label for="code">Code *</label>
          <input id="code" type="text" formControlName="code" />
        </div>
        <div class="field">
          <label for="price">Price *</label>
          <input id="price" type="number" step="0.01" min="0" formControlName="price" />
        </div>
      </div>

      <div class="field">
        <label for="name">Name *</label>
        <input id="name" type="text" formControlName="name" />
      </div>

      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" rows="3" formControlName="description"></textarea>
      </div>

      <div class="row two-cols">
        <div class="field">
          <label for="productLine">Product line</label>
          <input id="productLine" type="text" formControlName="productLine" />
        </div>
        <div class="field">
          <label for="category">Category</label>
          <input id="category" type="text" formControlName="category" />
        </div>
      </div>

      <div class="field">
        <div class="images-header">
          <label>Image URLs</label>
          <button type="button" class="ghost-btn small" (click)="addImage()">+ Add</button>
        </div>
        <div class="images-list" formArrayName="imageUrl">
          @for (ctrl of images.controls; track $index) {
            <div class="image-row">
              <input [formControlName]="$index" type="url" placeholder="https://..." />
              <button type="button" class="icon-btn" (click)="removeImage($index)" title="Remove">×</button>
            </div>
          }
          @if (images.length === 0) {
            <p class="hint">No images. Click "+ Add" to attach one.</p>
          }
        </div>
      </div>

      @if (isEdit) {
        <label class="checkbox">
          <input type="checkbox" formControlName="isActive" />
          <span>Active</span>
        </label>
      }

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }

      <div class="actions">
        <button type="button" class="ghost-btn" (click)="cancel()">Cancel</button>
        <button type="submit" class="primary-btn" [disabled]="isSubmitting">
          {{ isEdit ? 'Save changes' : 'Create product' }}
        </button>
      </div>
    </form>
  </div>
</div>
