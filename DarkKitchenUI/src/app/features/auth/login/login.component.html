<div class="login-container">
  <div class="brand">
    <img src="favicon.ico" alt="DarkKitchen" class="brand-icon" />
    <p class="app-title">DarkKitchen</p>
  </div>

  <div class="login-card">
    <h2>Log in</h2>

    @if (sessionMessage) {
      <p class="session-notice">{{ sessionMessage }}</p>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password" />
          <button type="button" class="toggle-password" (click)="togglePassword()">
            @if (showPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
      </div>

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }

      <button type="submit" [disabled]="form.invalid">Log in</button>
    </form>

    <div class="register-prompt">
      <span>Don't have an account?</span>
      <button type="button" class="register-btn" (click)="goToRegister()">Register</button>
    </div>
  </div>

  <div class="spacer"></div>
</div>
